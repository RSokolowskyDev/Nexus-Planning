<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css?v=2">
</head>

<body>
    <div id="app-wrapper">
        <header class="top-nav">
            <h1 class="logo">Nexus<span>Plan</span></h1>
            <div class="toolbar">
                <button class="tool-btn active" id="tool-pan" title="Move / Pan (Click & Drag)"><svg width="24"
                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 2L2 10l8 8M14 2l8 8-8 8" />
                    </svg></button>
                <button class="tool-btn" id="tool-select" title="Select (Esc)"><svg width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" />
                    </svg></button>
                <button class="tool-btn" id="btn-toggle-view" title="Toggle Week/Day View">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <path d="M9 3v18" />
                    </svg>
                </button>
                <div class="divider"></div>
                <div style="display: flex; align-items: center; gap: 8px; margin-right: 8px;">
                    <button class="tool-btn" id="tool-add" title="Draw New Event">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <line x1="12" y1="8" x2="12" y2="16" />
                            <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                    </button>
                    <select id="new-item-type"
                        style="background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); color: var(--text-main); height: 32px; border-radius: 6px; outline: none; font-size: 13px; font-family: var(--font-family); padding: 0 8px; cursor: pointer;">
                        <option value="project">Project</option>
                        <option value="meeting">Meeting</option>
                        <option value="task">Task</option>
                        <option value="milestone">Milestone</option>
                    </select>
                </div>
                <button class="tool-btn" id="btn-settings" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="zoom-controls">
                <button id="zoom-out" title="Zoom Out">-</button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in" title="Zoom In">+</button>
                <button id="zoom-reset" title="Reset View">Reset</button>
            </div>
        </header>


        <div id="main-split">
            <!-- Top Pane: Calendar Canvas -->
            <div id="calendar-pane">
                <div id="viewport">
                    <div id="canvas">
                        <div id="calendar-grid"></div>
                        <div id="items-container"></div>
                    </div>
                </div>
            </div>

            <!-- Horizontal Resizer -->
            <div id="h-resizer" class="resizer horizontal"></div>

            <!-- Doc Pane -->
            <div id="docs-pane"
                style="height: 0px; overflow: hidden; transition: height 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); border-top: none; width: 100%;">
                <div id="docs-mobile-handle" class="mobile-only">
                    <div class="handle-pill"></div>
                </div>
                <div class="doc-window" id="doc-1">
                    <div class="doc-header">
                        <input type="text" class="doc-title" placeholder="Select an event or project in calendar..."
                            disabled>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span class="doc-view-label"></span>
                            <button class="pin-btn" data-pinned="false">⚡ Dynamic View</button>
                            <button class="btn-delete" id="btn-delete-doc-1" title="Delete Event">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                            </button>
                            <button id="btn-add-doc-2" title="Split Window"
                                style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s;">+</button>
                            <button id="btn-swap-docs" title="Swap Windows"
                                style="display: none; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s;">⇄</button>
                            <button id="btn-minimize-pane" title="Minimize Panel"
                                style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s;">-</button>
                            <button id="btn-close-doc-1" title="Close Window"
                                style="display: none; background: rgba(255, 107, 107, 0.15); border: 1px solid rgba(255, 107, 107, 0.3); color: #ff6b6b; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s;">✕</button>
                        </div>
                    </div>
                    <div class="doc-metadata" style="display: none;">
                        <div class="meta-row meta-time-row">
                            <span class="meta-label">Time:</span>
                            <span class="meta-time-label"></span>
                            <div class="meta-time-edit-group hidden">
                                <span class="meta-date-prefix"></span>
                                <input type="time" class="meta-time-start meta-input-box">
                                <span class="meta-sep">-</span>
                                <input type="time" class="meta-time-end meta-input-box">
                                <span class="meta-sep">(</span>
                                <input type="number" class="meta-duration meta-input-box" step="0.5" min="0.25">
                                <span class="meta-sep">h)</span>
                            </div>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">People:</span>
                            <input type="text" class="meta-people" placeholder="Add assignees...">
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Goals:</span>
                            <input type="text" class="meta-goals" placeholder="Primary objectives...">
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Repeat:</span>
                            <select class="meta-repeat meta-input-box">
                                <option value="none">Does not repeat</option>
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly on Mondays</option>
                                <option value="weekdays">Every weekday (Mon-Fri)</option>
                                <option value="monthly">Monthly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                        </div>
                    </div>
                    <textarea class="doc-editor" disabled placeholder="Documentation details..."></textarea>
                </div>
                <!-- Vertical Resizer -->
                <div class="resizer vertical" id="v-resizer"></div>

                <div class="doc-window" id="doc-2">
                    <div class="doc-header">
                        <input type="text" class="doc-title" placeholder="Select an event or project in calendar..."
                            disabled>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span class="doc-view-label"></span>
                            <button class="pin-btn active" data-pinned="true">📌 Pinned View</button>
                            <button class="btn-delete" id="btn-delete-doc-2" title="Delete Event">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                            </button>
                            <button id="btn-close-doc-2" title="Close Window"
                                style="background: rgba(255, 107, 107, 0.15); border: 1px solid rgba(255, 107, 107, 0.3); color: #ff6b6b; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s;">✕</button>
                        </div>
                    </div>
                    <div class="doc-metadata" style="display: none;">
                        <div class="meta-row meta-time-row">
                            <span class="meta-label">Time:</span>
                            <span class="meta-time-label"></span>
                            <div class="meta-time-edit-group hidden">
                                <span class="meta-date-prefix"></span>
                                <input type="time" class="meta-time-start meta-input-box">
                                <span class="meta-sep">-</span>
                                <input type="time" class="meta-time-end meta-input-box">
                                <span class="meta-sep">(</span>
                                <input type="number" class="meta-duration meta-input-box" step="0.5" min="0.25">
                                <span class="meta-sep">h)</span>
                            </div>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">People:</span>
                            <input type="text" class="meta-people" placeholder="Add assignees...">
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Goals:</span>
                            <input type="text" class="meta-goals" placeholder="Primary objectives...">
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Repeat:</span>
                            <select class="meta-repeat meta-input-box">
                                <option value="none">Does not repeat</option>
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly on Mondays</option>
                                <option value="weekdays">Every weekday (Mon-Fri)</option>
                                <option value="monthly">Monthly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                        </div>
                    </div>
                    <textarea class="doc-editor"
                        placeholder="Write persistent notes, tasks, or scratchpad info here..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="form-group">
                <label>Day Start Time (Hour 0-23)</label>
                <input type="number" id="set-start-hour" value="0" min="0" max="23">
            </div>
            <div class="form-group">
                <label>Day End Time (Hour 1-24)</label>
                <input type="number" id="set-end-hour" value="24" min="1" max="24">
            </div>
            <div class="form-group">
                <label>Grid Interval (Minutes)</label>
                <select id="set-snap-mins">
                    <option value="15">15 Minutes</option>
                    <option value="30">30 Minutes</option>
                    <option value="60" selected>60 Minutes (1 Hour)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Time Format</label>
                <select id="set-time-format">
                    <option value="12h" selected>12-Hour (AM/PM)</option>
                    <option value="24h">Military (24-Hour)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Default New Event Duration (Hours)</label>
                <input type="number" id="set-def-hours" value="2" min="0.25" max="24" step="0.5">
            </div>
            <div class="form-actions">
                <button class="btn-secondary" id="cancel-settings">Cancel</button>
                <button class="btn-primary" id="save-settings">Save Options</button>
            </div>
        </div>
    </div>

    <!-- Mobile Day View Overlay (outside app-wrapper so it stays visible) -->
    <div id="mobile-day-overlay" style="display:none;">
        <div class="mdo-header">
            <button id="mdo-back" class="mdo-back-btn">← Week</button>
            <div class="mdo-date-title" id="mdo-date-title">Wed, Mar 31</div>
            <button id="mdo-today" class="mdo-today-btn">Today</button>
        </div>
        <div class="mdo-day-strip" id="mdo-day-strip"></div>
        <div class="mdo-schedule" id="mdo-schedule"></div>
        
        <div id="mdo-fab-container">
            <div id="mdo-speed-dial">
                <div class="mdo-menu-item" data-type="milestone">
                    <span class="mdo-menu-label">Milestone</span>
                    <button class="mdo-menu-btn color-purple">◆</button>
                </div>
                <div class="mdo-menu-item" data-type="task">
                    <span class="mdo-menu-label">Task</span>
                    <button class="mdo-menu-btn color-blue">✔</button>
                </div>
                <div class="mdo-menu-item" data-type="meeting">
                    <span class="mdo-menu-label">Meeting</span>
                    <button class="mdo-menu-btn color-orange">👥</button>
                </div>
                <div class="mdo-menu-item" data-type="project">
                    <span class="mdo-menu-label">Project</span>
                    <button class="mdo-menu-btn color-pink">■</button>
                </div>
            </div>
            <button id="mdo-fab" class="mdo-fab-main">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>

</html>
